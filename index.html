<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Aqsa ❤️</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  height:100vh;
  background:radial-gradient(circle at top,#1a001f,#000);
  overflow:hidden;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

.scene{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
  opacity:0;
  transition:opacity 1.5s ease;
}

.scene.active{
  opacity:1;
}

h1{
  font-size:40px;
  margin-bottom:20px;
  background:linear-gradient(45deg,#ff4e8a,#a64dff);
  -webkit-background-clip:text;
  color:transparent;
}

.text{
  max-width:700px;
  font-size:20px;
  line-height:1.6;
  min-height:120px;
}

button{
  padding:14px 30px;
  border:none;
  border-radius:30px;
  font-size:18px;
  cursor:pointer;
  margin:10px;
  transition:.3s;
}

.yes{
  background:#ff2e63;
  color:white;
}

.yes:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px #ff2e63;
}

.no{
  background:#444;
  color:white;
}

.heart{
  position:fixed;
  font-size:20px;
  animation:floatUp 4s linear forwards;
}

@keyframes floatUp{
  0%{transform:translateY(0) scale(1);opacity:1;}
  100%{transform:translateY(-800px) scale(2);opacity:0;}
}
</style>
</head>

<body>

<div class="scene active" id="scene1">
  <h1>Aqsa ❤️</h1>
  <div class="text" id="story"></div>
</div>

<div class="scene" id="scene2">
  <h1>Will You Be Mine Forever? 💍</h1>
  <button class="yes" onclick="startMusic(); finalYes()">Yes 💖</button>
  <button class="no">No 😢</button>
</div>

<audio id="bgMusic" src="song.mp3" loop></audio>

<script>

// Long cinematic story (8 min feel)
const storyLines = [
"From the very first moment I saw you...",
"I didn't know that my world was about to change.",
"You entered my life quietly...",
"But your presence became the loudest happiness in my heart.",
"Every smile of yours feels like sunrise.",
"Every laugh feels like music I never want to end.",
"You are not just someone I love...",
"You are the peace I prayed for.",
"The comfort I searched for.",
"The dream I never knew I needed.",
"And today...",
"I don't want just moments with you...",
"I want forever with you.",
"So Aqsa...",
"There is only one question left..."
];

let lineIndex = 0;
let charIndex = 0;
let deleting = false;
const storyEl = document.getElementById("story");

function typeWriter(){
  if(lineIndex < storyLines.length){

    if(!deleting && charIndex <= storyLines[lineIndex].length){
      storyEl.innerHTML = storyLines[lineIndex].substring(0,charIndex++);
    }

    if(charIndex === storyLines[lineIndex].length + 1){
      deleting = true;
      setTimeout(typeWriter,1500);
      return;
    }

    if(deleting && charIndex >= 0){
      storyEl.innerHTML = storyLines[lineIndex].substring(0,charIndex--);
    }

    if(charIndex < 0){
      deleting = false;
      lineIndex++;
    }

    setTimeout(typeWriter,deleting?40:80);
  }else{
    setTimeout(()=>{
      document.getElementById("scene1").classList.remove("active");
      document.getElementById("scene2").classList.add("active");
    },1000);
  }
}

window.onload = typeWriter;


// 🎵 Start Music
function startMusic(){
  const music=document.getElementById("bgMusic");
  if(!music) return;

  music.currentTime=0;
  music.volume=1;

  music.play().catch(err=>console.log(err));
}


// 💖 Final YES Explosion
function finalYes(){
  for(let i=0;i<80;i++){
    let heart=document.createElement("div");
    heart.innerHTML="❤️";
    heart.className="heart";
    heart.style.left=Math.random()*window.innerWidth+"px";
    heart.style.bottom="0px";
    heart.style.fontSize=(20+Math.random()*40)+"px";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),4000);
  }

  alert("You just made Sahil the happiest man alive ❤️");
}

</script>

</body>
</html>
