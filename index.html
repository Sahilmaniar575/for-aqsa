<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Aqsa ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #ff4e8a, #8a2be2);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  width: 350px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  position: relative;
}

h1 {
  margin-bottom: 20px;
  color: #ff2e63;
}

.typewriter {
  min-height: 60px;
  font-size: 18px;
  margin-bottom: 30px;
  color: #333;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  margin: 5px;
  transition: 0.3s;
}

.yes {
  background: #ff2e63;
  color: white;
}

.yes:hover {
  transform: scale(1.1);
}

.no {
  background: #ccc;
}

.heart {
  position: fixed;
  font-size: 20px;
  animation: floatUp 3s linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-600px); opacity: 0; }
}
</style>
</head>

<body>

<div class="card">
  <h1>Aqsa ❤️</h1>
  <div class="typewriter"></div>

  <button class="yes" onclick="startMusic(); acceptLove()">Yes 💍</button>
  <button class="no">No 😢</button>
</div>

<!-- 🎵 Background Music -->
<audio id="bgMusic" src="song.mp3" loop></audio>

<script>

// 🎵 Start Music
function startMusic() {
  const music = document.getElementById("bgMusic");

  if (!music) {
    console.log("Music not found");
    return;
  }

  music.currentTime = 0;
  music.volume = 1;

  music.play()
    .then(() => console.log("Music started"))
    .catch(err => console.log("Playback error:", err));
}


// 💍 YES Button Animation
function acceptLove() {
  for (let i = 0; i < 40; i++) {
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.className = "heart";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.bottom = "0px";
    heart.style.fontSize = (20 + Math.random() * 30) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
  }
}


// ✨ Typewriter Effect
const chapters = [
  "From the first moment I saw you...",
  "Something changed inside me...",
  "Every smile of yours feels like magic...",
  "Every conversation feels like home...",
  "And today I just want to ask you one thing...",
  "Will you be mine forever?"
];

let i = 0;
let j = 0;
let currentText = "";
let isDeleting = false;

const textElement = document.querySelector(".typewriter");

function typeEffect() {
  if (i < chapters.length) {

    if (!isDeleting && j <= chapters[i].length) {
      currentText = chapters[i].substring(0, j++);
      textElement.innerHTML = currentText;
    }

    if (j === chapters[i].length + 1) {
      isDeleting = true;
      setTimeout(typeEffect, 1500);
      return;
    }

    if (isDeleting && j >= 0) {
      currentText = chapters[i].substring(0, j--);
      textElement.innerHTML = currentText;
    }

    if (j < 0) {
      isDeleting = false;
      i++;
    }

    setTimeout(typeEffect, isDeleting ? 40 : 80);
  }
}

window.onload = typeEffect;

</script>

</body>
</html>
