<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Aqsa ❤️</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        color: white;
        overflow: hidden;
    }

    .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        max-width: 400px;
        animation: fadeIn 2s ease-in-out;
    }

    h1 {
        font-size: 28px;
    }

    p {
        font-size: 18px;
        margin: 20px 0;
    }

    button {
        padding: 12px 25px;
        border: none;
        border-radius: 30px;
        font-size: 16px;
        cursor: pointer;
        margin: 10px;
        transition: 0.3s;
    }

    .yes {
        background: #ff4e50;
        color: white;
    }

    .no {
        background: white;
        color: #ff4e50;
        position: absolute;
    }

    button:hover {
        transform: scale(1.1);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div class="card">
    <h1>Hey Aqsa ❤️</h1>
    <p>
        From the day you came into my life, everything became brighter, happier, and more beautiful.
        You are my peace, my happiness, my everything.
    </p>
    <p>
        So today I want to ask you something special...
    </p>
    <h2>Will you be mine forever? 💍</h2>

    <button class="yes" onclick="sayYes()">Yes ❤️</button>
    <button class="no" onmouseover="moveButton()">No 😜</button>
</div>

<script>
function sayYes() {
    document.body.innerHTML = `
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#ff4e50;color:white;font-size:30px;text-align:center;">
            Yaaayyyy ❤️ I Love You So Much Aqsa 💕 <br> Forever Starts Now 💍
        </div>
    `;
}

function moveButton() {
    const button = document.querySelector('.no');
    const x = Math.random() * window.innerWidth - 100;
    const y = Math.random() * window.innerHeight - 50;
    button.style.left = x + "px";
    button.style.top = y + "px";
}
</script>

</body>
</html>
